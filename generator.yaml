operations:
  CreateBackupPlan:
    input_wrapper_field_path: BackupPlan
  UpdateBackupPlan:
    input_wrapper_field_path: BackupPlan
  GetBackupPlan:
    output_wrapper_field_path: BackupPlan

ignore:
  resource_names:
    - BackupSelection
    - Framework
    - LegalHold
    - LogicallyAirGappedBackupVault
    - ReportPlan
    - RestoreAccessBackupVault
    - RestoreTestingPlan
    - RestoreTestingSelection
    - TieringConfiguration
  field_paths: []

resources:
  BackupVault:
    fields:
      Name:
        is_primary_key: true
    renames:
      operations:
        CreateBackupVault:
          input_fields:
            BackupVaultName: Name
            BackupVaultTags: Tags
        DeleteBackupVault:
          input_fields:
            BackupVaultName: Name
        DescribeBackupVault:
          input_fields:
            BackupVaultName: Name
          output_fields:
            BackupVaultName: Name
    exceptions:
      errors:
        404:
          code: AccessDeniedException
    tags:
      ignore: true
  BackupPlan:
    hooks:
      sdk_update_post_build_request:
        template_path: hooks/backup_plan/sdk_update_post_build_request.go.tpl
    fields:
      BackupPlanID:
        is_primary_key: true
      Rules.TargetBackupVaultName:
        references:
          resource: BackupVault
          path: Spec.Name
    renames:
      operations:
        CreateBackupPlan:
          input_fields:
            BackupPlanName: Name
            BackupPlanTags: Tags
        UpdateBackupPlan:
          input_fields:
            BackupPlanName: Name
        GetBackupPlan:
          output_fields:
            BackupPlanName: Name
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
    tags:
      ignore: true
